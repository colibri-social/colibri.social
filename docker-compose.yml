services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PRIVATE_KEY_1=${PRIVATE_KEY_1}
        - PRIVATE_KEY_2=${PRIVATE_KEY_2}
        - INVITE_API_KEY=${INVITE_API_KEY}
        - APPVIEW_DOMAIN=${APPVIEW_DOMAIN}
        - SAME_TLD_DID=${SAME_TLD_DID}
        - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
        - REDIS_PASSWORD=${REDIS_PASSWORD}
        - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
        - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
        - LIVEKIT_SERVER_URL=${LIVEKIT_SERVER_URL}
        - SENTRY_DSN=${SENTRY_DSN}
        - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
    container_name: colibri-app
    restart: unless-stopped
    ports:
      - "0.0.0.0:4322:4321"
    environment:
      - PRIVATE_KEY_1=${PRIVATE_KEY_1}
      - PRIVATE_KEY_2=${PRIVATE_KEY_2}
      - INVITE_API_KEY=${INVITE_API_KEY}
      - APPVIEW_DOMAIN=${APPVIEW_DOMAIN}
      - SAME_TLD_DID=${SAME_TLD_DID}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_SERVER_URL=${LIVEKIT_SERVER_URL}
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}

    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  redis:
    image: redis:7.2-alpine
    container_name: colibri-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass "${REDIS_PASSWORD}"
    ports:
      - "127.0.0.1:6380:6379" # TODO: Change back to 6379 before merging
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  redis_data:
    driver: local
