# Persistence
# RDB snapshots

# after 1 hour if at least 1 key changed
save 3600 1

# after 5 minutes if at least 100 keys changed
save 300 100

# after 1 minute if at least 1000 keys changed
save 60 1000

dbfilename dump.rdb
dir /data

# AOF
appendonly yes
appendfilename "appendonly.aof"
# fsync every second - good balance of safety & perf
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
# hybrid mode: RDB preamble in AOF for faster loads
aof-use-rdb-preamble yes
aof-load-truncated yes

# Memory
maxmemory 256mb
# only evict keys that HAVE a TTL set
maxmemory-policy volatile-lru

# Security
requirepass ${REDIS_PASSWORD}
bind 0.0.0.0
protected-mode yes
